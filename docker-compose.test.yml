services:
  frontend-test:
    build:
      context: .
      dockerfile: Dockerfile.dev
    container_name: ninerlog-frontend-test
    working_dir: /app
    volumes:
      - .:/app
      - /app/node_modules
    environment:
      - NODE_ENV=test
      - CI=true
    command: npm run test -- --run --reporter=verbose
    profiles:
      - test

  frontend-e2e:
    build:
      context: .
      dockerfile: Dockerfile.e2e
    container_name: ninerlog-frontend-e2e
    working_dir: /app
    volumes:
      - .:/app
      - /app/node_modules
    environment:
      - NODE_ENV=test
      - CI=true
      - PLAYWRIGHT_BASE_URL=http://app.ninerlog.test:5173
      - HOME=/root
    command: npm run test:e2e
    profiles:
      - e2e
    depends_on:
      frontend-dev:
        condition: service_healthy
      api-test:
        condition: service_healthy
      minio-test-init:
        condition: service_completed_successfully
    networks:
      - test-network

  # Frontend dev server for E2E tests
  frontend-dev:
    build:
      context: .
      dockerfile: Dockerfile.dev
    container_name: ninerlog-frontend-dev-e2e
    working_dir: /app
    volumes:
      - .:/app
      - /app/node_modules
    environment:
      - VITE_API_PROXY_TARGET=http://api-test:3000
    ports:
      - "5174:5173"
    command: npm run dev -- --host 0.0.0.0
    healthcheck:
      test: ["CMD-SHELL", "node -e \"fetch('http://localhost:5173').then(r => process.exit(r.ok ? 0 : 1)).catch(() => process.exit(1))\""]
      interval: 5s
      timeout: 5s
      retries: 30
      start_period: 15s
    profiles:
      - e2e
    networks:
      test-network:
        aliases:
          # Multi-label hostname so WebAuthn RP_ID validation accepts it.
          - app.ninerlog.test

  # MailPit test email server for password reset e2e tests
  mailpit-test:
    image: axllent/mailpit:latest
    container_name: ninerlog-frontend-test-mailpit
    expose:
      - "8025"
      - "1025"
    profiles:
      - e2e
    networks:
      - test-network

  # Test database for e2e tests
  postgres-test:
    image: postgres:16-alpine
    container_name: ninerlog-frontend-test-db
    environment:
      POSTGRES_USER: testuser
      POSTGRES_PASSWORD: testpass
      POSTGRES_DB: ninerlog_test
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U testuser -d ninerlog_test"]
      interval: 5s
      timeout: 5s
      retries: 5
    tmpfs:
      - /var/lib/postgresql
    profiles:
      - e2e
    networks:
      - test-network

  # API service for e2e tests
  api-test:
    build:
      context: ../ninerlog-api
      dockerfile: Dockerfile
    container_name: ninerlog-api-test
    depends_on:
      postgres-test:
        condition: service_healthy
      mailpit-test:
        condition: service_started
    expose:
      - "3000"
    environment:
      DATABASE_URL: postgresql://testuser:testpass@postgres-test:5432/ninerlog_test?sslmode=disable
      PORT: 3000
      GIN_MODE: test
      JWT_SECRET: "e2e-test-jwt-secret-key-minimum-32-chars"
      REFRESH_SECRET: "e2e-test-refresh-secret-key-minimum-32"
      JWT_EXPIRES_IN: 15m
      REFRESH_EXPIRES_IN: 7d
      CORS_ORIGIN: "*"
      LOG_LEVEL: info
      DISABLE_RATE_LIMIT: "true"
      SMTP_HOST: "mailpit-test"
      SMTP_PORT: "1025"
      SMTP_FROM: "noreply@ninerlog-test.com"
      FRONTEND_URL: "http://frontend-dev:5173"
      # WebAuthn / passkeys (e2e RP matches the in-docker frontend host alias)
      WEBAUTHN_RP_ID: "app.ninerlog.test"
      WEBAUTHN_RP_NAME: "NinerLog E2E"
      WEBAUTHN_RP_ORIGINS: "http://app.ninerlog.test:5173,http://localhost:5174,http://localhost:5173"
      # Cloud backups
      BACKUP_CREDENTIALS_KEY: "MDEyMzQ1Njc4OWFiY2RlZjAxMjM0NTY3ODlhYmNkZWY="
      E2E_S3_ENDPOINT: "http://seaweedfs-test:8333"
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://localhost:3000/health"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s
    profiles:
      - e2e
    networks:
      - test-network

  seaweedfs-test:
    image: chrislusf/seaweedfs:latest
    container_name: ninerlog-frontend-test-seaweedfs
    entrypoint:
      - /bin/sh
      - -c
      - |
        mkdir -p /etc/seaweedfs
        cat > /etc/seaweedfs/s3.json <<'EOF'
        {
          "identities": [
            {
              "name": "admin",
              "credentials": [
                { "accessKey": "ninerlogadmin", "secretKey": "ninerlogsecret" }
              ],
              "actions": ["Admin", "Read", "Write", "List", "Tagging"]
            }
          ]
        }
        EOF
        exec weed server -s3 -s3.port=8333 -s3.config=/etc/seaweedfs/s3.json -dir=/data -ip=seaweedfs-test
    expose:
      - "8333"
      - "9333"
    healthcheck:
      test:
        - CMD-SHELL
        - |
          curl -sf http://localhost:9333/cluster/status > /dev/null \
          && curl -s -o /dev/null -w '%{http_code}' http://localhost:8333/ | grep -qE '200|403'
      interval: 5s
      timeout: 5s
      retries: 30
    profiles:
      - e2e
    networks:
      - test-network

  minio-test-init:
    # Init job that creates the e2e bucket on SeaweedFS via `weed shell`.
    # Keeps the legacy service name so existing run scripts keep working.
    image: chrislusf/seaweedfs:latest
    container_name: ninerlog-frontend-test-seaweedfs-init
    depends_on:
      seaweedfs-test:
        condition: service_healthy
    entrypoint:
      - /bin/sh
      - -c
      - |
        for i in $$(seq 1 30); do
          echo "s3.bucket.create -name ninerlog-backups" | weed shell -master seaweedfs-test:9333 && exit 0
          sleep 1
        done
        echo "failed to create bucket" >&2
        exit 1
    profiles:
      - e2e
    networks:
      - test-network

networks:
  test-network:
    driver: bridge
