<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="/vite.svg" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="description" content="EASA/FAA Compliant Pilot Logbook" />
    <meta name="theme-color" content="#2563eb" />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <title>PilotLog - Pilot Logbook</title>
    <!-- Runtime environment variables (injected by docker-entrypoint.sh) -->
    <script src="/env-config.js"></script>
  </head>
  <body>
    <noscript>PilotLog requires JavaScript to run.</noscript>
    <!-- Prevent flash of wrong theme -->
    <script>
      (function() {
        try {
          var stored = JSON.parse(localStorage.getItem('pilotlog-theme') || '{}');
          var theme = stored.state && stored.state.theme;
          var dark = theme === 'dark' || (theme !== 'light' && window.matchMedia('(prefers-color-scheme: dark)').matches);
          if (dark) document.documentElement.classList.add('dark');
        } catch(e) {}
      })();
    </script>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
