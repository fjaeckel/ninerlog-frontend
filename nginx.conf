user nginx;
worker_processes auto;
error_log /dev/stderr warn;
pid /var/run/nginx.pid;

events {
    worker_connections 1024;
}

http {
    include /etc/nginx/mime.types;
    default_type application/octet-stream;

    # Increase bucket size for long map keys (beta gate SHA-256 hashes)
    map_hash_bucket_size 128;

    # Beta access gate (generated by docker-entrypoint.sh)
    include /etc/nginx/beta-gate.conf;

    # Scale the log line's level with the response status, matching the Go
    # API's slog behaviour (5xx -> error, 4xx -> warn, else info).
    map $status $log_level {
        "~^5" "error";
        "~^4" "warn";
        default "info";
    }

    # Original request path with the query string stripped. Query strings can
    # carry sensitive values, so — like the API access log — we never log them.
    # Derived from $request_uri (the untouched original) rather than $uri, so
    # SPA routes rewritten to /index.html by try_files still log their real
    # path.
    map $request_uri $request_path {
        "~^(?<path_only>[^?]*)" $path_only;
        default $request_uri;
    }

    # Structured JSON access log — one object per request, same field shape as
    # the API's slog output so both parse with identical tooling. escape=json
    # keeps embedded quotes/controls in header values from breaking the JSON.
    # $request_id is echoed to the API via X-Request-ID (see the /api/ proxy
    # block) so a proxy line and its backend line share one id.
    log_format json_access escape=json
        '{'
            '"time":"$time_iso8601",'
            '"level":"$log_level",'
            '"logger":"nginx",'
            '"request_id":"$request_id",'
            '"method":"$request_method",'
            '"path":"$request_path",'
            '"status":$status,'
            '"body_bytes_sent":$body_bytes_sent,'
            '"request_time":$request_time,'
            '"upstream_response_time":"$upstream_response_time",'
            '"remote_addr":"$remote_addr",'
            '"x_forwarded_for":"$http_x_forwarded_for",'
            '"referer":"$http_referer",'
            '"user_agent":"$http_user_agent"'
        '}';

    access_log /dev/stdout json_access;

    sendfile on;
    tcp_nopush on;
    tcp_nodelay on;
    keepalive_timeout 65;
    types_hash_max_size 2048;
    client_max_body_size 10M;

    # Gzip compression
    gzip on;
    gzip_vary on;
    gzip_proxied any;
    gzip_comp_level 6;
    gzip_types text/plain text/css text/xml text/javascript
               application/json application/javascript application/xml+rss
               application/rss+xml font/truetype font/opentype
               application/vnd.ms-fontobject image/svg+xml;

    # TLS server block (generated at runtime by docker-entrypoint.sh)
    # When TLS_DOMAIN is set, this overrides the default server with HTTPS + redirect.
    include /etc/nginx/conf.d/tls.conf;

    # Prometheus metrics — nginx stub_status on a dedicated internal port.
    # Port 8080 is NEVER published to the host (see docker-compose.yml), so this
    # endpoint is reachable only by the nginx-exporter sidecar on the internal
    # Docker network. stub_status exposes connection counters only — no PII.
    server {
        listen 8080;
        server_name _;

        location = /stub_status {
            stub_status;
            access_log off;
        }

        # Nothing else is served on this port.
        location / {
            return 404;
        }
    }

    # Default HTTP server (used when TLS is not configured)
    server {
        listen 80;
        server_name _;
        root /usr/share/nginx/html;
        index index.html;

        # Security headers
        add_header X-Frame-Options "SAMEORIGIN" always;
        add_header X-Content-Type-Options "nosniff" always;
        add_header X-XSS-Protection "1; mode=block" always;
        add_header Referrer-Policy "no-referrer-when-downgrade" always;
        add_header Content-Security-Policy "default-src 'self'; script-src 'self' 'unsafe-inline'; style-src 'self' 'unsafe-inline' https://fonts.googleapis.com; img-src 'self' data: blob: https://*.tile.openstreetmap.org; font-src 'self' https://fonts.gstatic.com; connect-src 'self'; frame-ancestors 'self'; base-uri 'self'; form-action 'self'; worker-src 'self' blob:; manifest-src 'self'" always;

        # Service worker + its registration bootstrap. vite-plugin-pwa's
        # generateSW mode emits sw.js and registerSW.js (not the
        # service-worker.js this block used to (wrongly) target — that name
        # never matched anything, so both files fell through to the
        # long-cache static-asset rule below and got served
        # `Cache-Control: public, immutable, expires 1y`. Browsers are
        # supposed to bypass HTTP caching when checking for SW updates
        # regardless of headers, but not all of them reliably do — Safari
        # in particular has a history of being inconsistent here — so these
        # must be served no-cache explicitly rather than relying on that.
        # workbox-<hash>.js is fine to stay long-cached: its filename is
        # content-hashed, so a new build simply ships a differently-named
        # file rather than requiring cache invalidation of the old one.
        location = /sw.js {
            add_header Cache-Control "no-cache, no-store, must-revalidate";
            add_header Pragma "no-cache";
            add_header Expires 0;
        }
        location = /registerSW.js {
            add_header Cache-Control "no-cache, no-store, must-revalidate";
            add_header Pragma "no-cache";
            add_header Expires 0;
        }

        # Runtime env config — must never be cached (changes per deployment)
        location = /env-config.js {
            add_header Cache-Control "no-cache, no-store, must-revalidate";
            add_header Pragma "no-cache";
            add_header Expires 0;
        }

        # Static assets with long cache
        location ~* \.(js|css|png|jpg|jpeg|gif|ico|svg|woff|woff2|ttf|eot)$ {
            expires 1y;
            add_header Cache-Control "public, immutable";
        }

        # Health check endpoint
        location /health {
            access_log off;
            return 200 "healthy\n";
            add_header Content-Type text/plain;
        }

        # Beta token verification endpoint (used by BetaGate component)
        location = /beta-verify {
            default_type text/plain;
            if ($beta_valid = "yes") {
                return 200 'ok';
            }
            return 403 'forbidden';
        }

        # ACME challenge for Let's Encrypt cert renewal
        location /.well-known/acme-challenge/ {
            root /var/www/certbot;
        }

        # API proxy — all /api/ requests forwarded to backend
        location /api/ {
            proxy_pass http://ninerlog-api:3000;
            proxy_http_version 1.1;
            proxy_set_header Upgrade $http_upgrade;
            proxy_set_header Connection 'upgrade';
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            # Hand the API the same request id nginx logs, so the proxy access
            # log and the backend's slog line correlate. The API reuses this
            # header when present (see its LoggerMiddleware).
            proxy_set_header X-Request-ID $request_id;
            proxy_cache_bypass $http_upgrade;
        }

        # React Router - all routes to index.html
        location / {
            try_files $uri $uri/ /index.html;
        }

        # Error pages
        error_page 404 /index.html;
    }
}
