name: Performance

on:
  workflow_dispatch:
  pull_request:
    branches: [main]
    types: [labeled]

concurrency:
  group: perf-frontend-${{ github.ref }}
  cancel-in-progress: true

jobs:
  bundle-size:
    name: Bundle Size Check
    if: github.event_name == 'workflow_dispatch' || contains(github.event.pull_request.labels.*.name, 'perf-test')
    runs-on: self-hosted
    timeout-minutes: 10

    steps:
      - name: Checkout PR
        uses: actions/checkout@v6

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: '24'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Build with analysis
        run: ANALYZE=true npx tsc && ANALYZE=true npx vite build

      - name: Record bundle sizes
        id: bundle
        run: |
          TOTAL_JS=$(find dist/assets -name '*.js' -exec wc -c {} + | tail -1 | awk '{print $1}')
          TOTAL_CSS=$(find dist/assets -name '*.css' -exec wc -c {} + | tail -1 | awk '{print $1}')
          LARGEST_CHUNK=$(find dist/assets -name '*.js' -exec wc -c {} + | sort -rn | head -2 | tail -1 | awk '{print $1}')
          echo "total_js=$TOTAL_JS" >> "$GITHUB_OUTPUT"
          echo "total_css=$TOTAL_CSS" >> "$GITHUB_OUTPUT"
          echo "largest_chunk=$LARGEST_CHUNK" >> "$GITHUB_OUTPUT"
          echo "## Bundle Size Report" >> "$GITHUB_STEP_SUMMARY"
          echo "| Metric | Size |" >> "$GITHUB_STEP_SUMMARY"
          echo "|--------|------|" >> "$GITHUB_STEP_SUMMARY"
          echo "| Total JS | $(echo "$TOTAL_JS" | awk '{printf "%.1f KB", $1/1024}') |" >> "$GITHUB_STEP_SUMMARY"
          echo "| Total CSS | $(echo "$TOTAL_CSS" | awk '{printf "%.1f KB", $1/1024}') |" >> "$GITHUB_STEP_SUMMARY"
          echo "| Largest Chunk | $(echo "$LARGEST_CHUNK" | awk '{printf "%.1f KB", $1/1024}') |" >> "$GITHUB_STEP_SUMMARY"

      - name: Upload bundle stats
        uses: actions/upload-artifact@v4
        with:
          name: bundle-stats
          path: dist/stats.html

  lighthouse:
    name: Lighthouse CI
    if: github.event_name == 'workflow_dispatch' || contains(github.event.pull_request.labels.*.name, 'perf-test')
    runs-on: self-hosted
    timeout-minutes: 15

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: '24'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Build
        run: npx tsc && npx vite build

      - name: Run Lighthouse CI
        id: lhci
        run: npx lhci autorun 2>&1 | tee lighthouse-output.txt
        env:
          LHCI_GITHUB_APP_TOKEN: ${{ secrets.LHCI_GITHUB_APP_TOKEN }}

      - name: Generate Lighthouse summary
        if: always()
        run: |
          {
            echo "## Lighthouse CI Results"
            echo ""
            echo "| URL | Performance | Accessibility | Best Practices | SEO |"
            echo "|-----|-------------|---------------|----------------|-----|"
            for f in .lighthouseci/lhr-*.json; do
              [ -f "$f" ] || continue
              row=$(python3 -c "
          import json
          d = json.load(open('$f'))
          url = d.get('finalUrl', d.get('requestedUrl', '?'))
          path = url.replace('http://localhost:4173', '') or '/'
          cats = d.get('categories', {})
          perf = int((cats.get('performance', {}).get('score', 0) or 0) * 100)
          a11y = int((cats.get('accessibility', {}).get('score', 0) or 0) * 100)
          bp = int((cats.get('best-practices', {}).get('score', 0) or 0) * 100)
          seo = int((cats.get('seo', {}).get('score', 0) or 0) * 100)
          perf_icon = '✅' if perf >= 90 else '⚠️' if perf >= 50 else '❌'
          print(f'| {path} | {perf_icon} {perf} | {a11y} | {bp} | {seo} |')
              " 2>/dev/null)
              [ -n "$row" ] && echo "$row"
            done
            echo ""
            echo "### Core Web Vitals"
            echo ""
            echo "| URL | FCP | LCP | CLS | TBT |"
            echo "|-----|-----|-----|-----|-----|"
            for f in .lighthouseci/lhr-*.json; do
              [ -f "$f" ] || continue
              row=$(python3 -c "
          import json
          d = json.load(open('$f'))
          url = d.get('finalUrl', d.get('requestedUrl', '?'))
          path = url.replace('http://localhost:4173', '') or '/'
          audits = d.get('audits', {})
          fcp = audits.get('first-contentful-paint', {}).get('displayValue', '?')
          lcp = audits.get('largest-contentful-paint', {}).get('displayValue', '?')
          cls = audits.get('cumulative-layout-shift', {}).get('displayValue', '?')
          tbt = audits.get('total-blocking-time', {}).get('displayValue', '?')
          print(f'| {path} | {fcp} | {lcp} | {cls} | {tbt} |')
              " 2>/dev/null)
              [ -n "$row" ] && echo "$row"
            done
          } > lighthouse-summary.md
          cat lighthouse-summary.md >> "$GITHUB_STEP_SUMMARY"

      - name: Comment Lighthouse results on PR
        if: always() && github.event_name == 'pull_request'
        uses: marocchino/sticky-pull-request-comment@v2
        with:
          header: lighthouse-results
          path: lighthouse-summary.md
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Upload Lighthouse results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: lighthouse-results
          path: .lighthouseci/
