name: Generate OpenAPI Client

on:
  repository_dispatch:
    types: [openapi-updated]
  workflow_dispatch:
  push:
    branches: [main]
    paths:
      - 'scripts/generate-api-client.sh'

jobs:
  generate-client:
    name: Generate TypeScript API Client
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout frontend repository
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Checkout project repository for OpenAPI spec
        uses: actions/checkout@v4
        with:
          repository: fjaeckel/ninerlog-project
          token: ${{ secrets.PROJECT_REPO_TOKEN }}
          path: .openapi-spec
          sparse-checkout: |
            api-spec/openapi.yaml

      - name: Generate TypeScript client
        run: |
          npm run generate:api -- .openapi-spec/api-spec/openapi.yaml

      - name: Check for changes
        id: git-check
        run: |
          git diff --exit-code src/api/ || echo "changes=true" >> $GITHUB_OUTPUT

      - name: Commit and push if changed
        if: steps.git-check.outputs.changes == 'true'
        run: |
          git config --local user.email "github-actions[bot]@users.noreply.github.com"
          git config --local user.name "github-actions[bot]"
          git add src/api/
          git commit -m "chore(api): regenerate API client from OpenAPI spec [skip ci]"
          git push

      - name: Create Pull Request
        if: steps.git-check.outputs.changes == 'true' && github.event_name == 'repository_dispatch'
        uses: peter-evans/create-pull-request@v8
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          commit-message: "chore(api): regenerate API client from OpenAPI spec"
          title: "chore: Update API client from OpenAPI spec"
          body: |
            ## OpenAPI Client Update
            
            This PR updates the generated TypeScript API client to match the latest OpenAPI specification.
            
            **Triggered by**: OpenAPI spec change in ninerlog-project
            **Commit**: ${{ github.event.client_payload.sha }}
            
            ### Changes
            - Regenerated TypeScript types
            - Updated API client methods
            - Refreshed request/response models
            
            ### Testing
            - [ ] Build passes
            - [ ] Types are correct
            - [ ] No breaking changes (or documented)
            
            **Auto-generated by GitHub Actions**
          branch: openapi-client-update
          delete-branch: true
